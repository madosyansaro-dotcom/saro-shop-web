<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saro Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-900 text-white p-4 font-sans">

    <h1 class="text-2xl font-bold text-center text-green-400 mb-6">🛒 Продукты</h1>

    <div id="products-list" class="space-y-4">
        <p class="text-center text-gray-400 animate-pulse">Загрузка товаров из базы...</p>
    </div>

    <button id="checkoutBtn" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl hidden transition-all shadow-lg" onclick="sendOrder()">
        Оформить заказ на <span id="totalPrice">0</span> руб.
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 🔥 ССЫЛКА ОТ NGROK
        const NGROK_URL = "https://sappiness-lyrically-icky.ngrok-free.dev"; 

        let cart = []; 
        let checkoutBtn = document.getElementById('checkoutBtn');
        let totalPriceSpan = document.getElementById('totalPrice');

        async function loadProducts() {
            try {
                const response = await fetch(NGROK_URL + "/api/products", {
                    method: 'GET',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const products = await response.json();
                
                const container = document.getElementById('products-list');
                container.innerHTML = ''; 

                if (products.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-400">Товаров пока нет.</p>';
                    return;
                }

                products.forEach(p => {
                    container.innerHTML += `
                        <div class="bg-gray-800 p-4 rounded-xl flex justify-between items-center shadow-lg border border-gray-700">
                            <div>
                                <h2 class="font-bold text-lg">${p.name}</h2>
                                <p class="text-gray-400 text-sm">Цена: ${p.price} руб.</p>
                                <p class="text-gray-500 text-xs">Доступно: <span id="stock-${p.name}">${p.qty}</span> шт.</p>
                            </div>
                            <button id="btn-${p.name}" class="bg-green-500 hover:bg-green-400 text-black font-bold px-4 py-2 rounded-lg transition-colors" 
                                onclick="addToCart('${p.name}', ${p.price}, ${p.qty})">+ Добавить</button>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('products-list').innerHTML = '<p class="text-center text-red-500">Ошибка связи с сервером.</p>';
            }
        }

        function addToCart(name, price, maxQty) {
            let existing = cart.find(i => i.name === name);
            
            if (existing) {
                // Если пользователь пытается добавить больше, чем есть на складе — блокируем!
                if (existing.qty >= maxQty) {
                    alert(`Извините, нельзя заказать больше ${maxQty} шт. этого товара!`);
                    tg.HapticFeedback.notificationOccurred('error'); // Телефон завибрирует об ошибке
                    return;
                }
                existing.qty += 1;
            } else {
                if (maxQty <= 0) {
                    alert("Этого товара нет в наличии!");
                    return;
                }
                cart.push({ name: name, price: price, qty: 1 });
            }
            
            // Визуально уменьшаем доступное количество на экране витрины
            let stockSpan = document.getElementById(`stock-${name}`);
            if (stockSpan) {
                let currentStock = parseInt(stockSpan.innerText);
                stockSpan.innerText = currentStock - 1;
            }

            updateCheckoutButton();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateCheckoutButton() {
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            if (total > 0) {
                checkoutBtn.style.display = 'block';
                totalPriceSpan.innerText = total;
            }
        }

        function sendOrder() {
            let dataString = JSON.stringify(cart);
            tg.sendData(dataString); 
        }

        loadProducts();
    </script>
</body>
</html>
