<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saro Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white p-4 font-sans select-none">

    <h1 class="text-2xl font-bold text-center text-green-400 mb-6">🛒 Продукты</h1>

    <div id="products-list" class="space-y-4">
        <p class="text-center text-gray-400">Загрузка...</p>
    </div>

    <button id="checkoutBtn" class="w-full mt-8 bg-blue-600 text-white font-bold py-4 rounded-xl hidden shadow-lg" onclick="sendOrder()">
        Оформить заказ на <span id="totalPrice">0</span> руб.
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const NGROK_URL = "https://sappiness-lyrically-icky.ngrok-free.dev"; 
        let cart = [];
        let isAdmin = false;

        async function initApp() {
            try {
                // Запрашиваем список админов
                const res = await fetch(NGROK_URL + "/api/admins", {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                
                // Получаем список от Python
                const admins = await res.json(); 
                
                // Берем твой ID из самого Telegram
                const user = tg.initDataUnsafe?.user; 
                
                if (user) {
                    // Превращаем все ID в числа для точного сравнения
                    const adminIds = admins.map(id => Number(id));
                    isAdmin = adminIds.includes(Number(user.id));
                }
            } catch (e) { 
                console.error("Ошибка проверки прав:", e); 
            }
            
            // Загружаем товары только после проверки прав
            loadProducts();
        }

        async function loadProducts() {
            try {
                const response = await fetch(NGROK_URL + "/api/products", {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const products = await response.json();
                const container = document.getElementById('products-list');
                container.innerHTML = '';

                products.forEach(p => {
                    let isOut = p.qty <= 0;
                    
                    container.innerHTML += `
                        <div class="relative bg-gray-800 p-4 rounded-xl flex justify-between items-center border border-gray-700 shadow-md">
                            ${isAdmin ? `<button onclick="deleteProduct(${p.id})" class="absolute -top-2 -left-2 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs shadow-lg"><i class="fas fa-minus"></i></button>` : ''}
                            <div>
                                <h2 class="font-bold text-lg">${p.name}</h2>
                                <p class="text-gray-400 text-sm">${p.price} руб.</p>
                                <p class="text-gray-500 text-xs">В наличии: <span id="stock-${p.id}">${p.qty}</span></p>
                            </div>
                            <button id="btn-${p.id}" 
                                onclick="addToCart(${p.id}, '${p.name}', ${p.price}, ${p.qty})"
                                class="px-4 py-2 rounded-lg font-bold transition-all ${isOut ? 'bg-gray-600 text-gray-400 cursor-not-allowed' : 'bg-green-500 text-black active:scale-95'}"
                                ${isOut ? 'disabled' : ''}>
                                ${isOut ? 'Пусто' : '+ Добавить'}
                            </button>
                        </div>
                    `;
                });
            } catch (e) { container.innerHTML = "Ошибка связи."; }
        }

        function addToCart(id, name, price, maxQty) {
            let item = cart.find(i => i.id === id);
            let currentQty = item ? item.qty : 0;

            if (currentQty < maxQty) {
                if (item) { item.qty++; } else { cart.push({id, name, price, qty: 1}); }
                
                // Уменьшаем число на экране
                let stockSpan = document.getElementById(`stock-${id}`);
                let btn = document.getElementById(`btn-${id}`);
                let remaining = maxQty - (currentQty + 1);
                stockSpan.innerText = remaining;

                // Если стало 0 - гасим кнопку
                if (remaining <= 0) {
                    btn.disabled = true;
                    btn.className = "px-4 py-2 rounded-lg font-bold bg-gray-600 text-gray-400 cursor-not-allowed";
                    btn.innerText = "Максимум";
                }

                updateTotal();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        async function deleteProduct(id) {
            if (!confirm("Удалить этот товар совсем?")) return;
            try {
                await fetch(`${NGROK_URL}/api/products/${id}`, { method: 'DELETE' });
                loadProducts(); // Перезагружаем список
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) { alert("Не удалось удалить"); }
        }

        function updateTotal() {
            let total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const checkBtn = document.getElementById('checkoutBtn');
            const totalSpan = document.getElementById('totalPrice');
            
            if (total > 0) {
                checkBtn.classList.remove('hidden');
                totalSpan.innerText = total;
            }
        }

        function sendOrder() {
            tg.sendData(json.stringify(cart));
        }

        initApp();
    </script>
</body>
</html>
