<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saro Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white p-4 font-sans select-none">

    <div id="cart-float" class="fixed top-4 right-4 z-50 bg-blue-600 p-3 rounded-full shadow-lg hidden" onclick="openCart()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-xs w-5 h-5 flex items-center justify-center rounded-full">0</span>
    </div>

    <h1 class="text-2xl font-bold text-center text-green-400 mb-6">🛒 Продукты</h1>

    <div id="products-list" class="space-y-3"></div>

    <div id="cart-modal" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-50 hidden p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Ваша корзина</h2>
            <button onclick="closeCart()" class="text-gray-400"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div id="cart-items" class="space-y-3"></div>
        <button class="w-full mt-6 bg-green-600 py-3 rounded-xl font-bold" onclick="sendOrder()">Оформить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; 
        tg.expand();
        const NGROK_URL = "https://sappiness-lyrically-icky.ngrok-free.dev"; 
        let cart = [], isAdmin = false;

        async function initApp() {
            await new Promise(resolve => setTimeout(resolve, 500));
            try {
                const res = await fetch(NGROK_URL + "/api/admins", { headers: { 'ngrok-skip-browser-warning': 'true' } });
                const admins = await res.json();
                const userId = tg.initDataUnsafe?.user?.id;
                isAdmin = admins.map(String).includes(String(userId));
            } catch(e) { console.error("Admin check failed", e); }
            loadProducts();
        }

        async function loadProducts() {
            try {
                const res = await fetch(NGROK_URL + "/api/products", { headers: { 'ngrok-skip-browser-warning': 'true' } });
                const products = await res.json();
                const list = document.getElementById('products-list');
                
                list.innerHTML = products.map(p => `
                    <div class="bg-gray-800 p-3 rounded-lg flex justify-between items-center border border-gray-700">
                        <div class="flex items-center gap-2">
                            <button id="del-${p.id}" onclick="deleteProduct(${p.id})" class="text-red-500 w-8 h-8 ${isAdmin ? '' : 'hidden'}">
                                <i class="fas fa-trash"></i>
                            </button>
                            <div>
                                <h2 class="font-bold text-sm">${p.name}</h2>
                                <p class="text-gray-400 text-xs">${p.price} руб. | В наличии: ${p.qty}</p>
                            </div>
                        </div>
                        <button class="w-10 h-10 bg-green-500 rounded text-black font-bold text-xl" onclick="addToCart(${p.id}, '${p.name}', ${p.price}, ${p.qty})">+</button>
                    </div>
                `).join('');
                
                // Принудительная проверка для iPhone:
                if (isAdmin) {
                    document.querySelectorAll('[id^="del-"]').forEach(el => el.classList.remove('hidden'));
                }
            } catch(e) { console.error(e); }
        }

        window.addToCart = (id, name, price, maxQty) => {
            let item = cart.find(i => i.id === id);
            if (!item) cart.push({id, name, price, qty: 1});
            else if (item.qty < maxQty) item.qty++;
            updateCartUI();
        };

        window.deleteProduct = async (id) => {
            if (!confirm("Удалить товар из магазина?")) return;
            try {
                // Добавляем заголовок 'ngrok-skip-browser-warning' и принудительный режим
                const response = await fetch(`${NGROK_URL}/api/products/${id}`, { 
                    method: 'DELETE',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                
                if (response.ok) {
                    loadProducts();
                } else {
                    alert("Ошибка при удалении товара.");
                }
            } catch (err) {
                console.error("Ошибка сети:", err);
            }
        };

        window.removeFromCart = (id) => {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
            openCart();
        };

        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-float').classList.toggle('hidden', count === 0);
        }

        window.openCart = () => {
            document.getElementById('cart-modal').classList.remove('hidden');
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.length === 0 ? '<p>Корзина пуста</p>' : cart.map(i => `
                <div class="flex justify-between bg-gray-800 p-3 rounded items-center">
                    <span>${i.name} (x${i.qty})</span>
                    <button class="text-red-500" onclick="removeFromCart(${i.id})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        };

        window.closeCart = () => document.getElementById('cart-modal').classList.add('hidden');
        window.sendOrder = () => {
            if(cart.length > 0) tg.sendData(JSON.stringify(cart));
            else alert("Корзина пуста");
        };

        initApp();
    </script>
</body>
</html>
