<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saro Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white p-4 font-sans select-none">

    <div id="cart-float" class="fixed top-4 right-4 z-50 bg-blue-600 p-3 rounded-full shadow-lg hidden" onclick="openCart()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-xs w-5 h-5 flex items-center justify-center rounded-full">0</span>
    </div>

    <h1 class="text-2xl font-bold text-center text-green-400 mb-6">🛒 Продукты</h1>

    <div id="products-list" class="space-y-3"></div>

    <div id="cart-modal" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-50 hidden p-4">
        <h2 class="text-xl font-bold mb-4">Ваша корзина</h2>
        <div id="cart-items" class="space-y-3"></div>
        <button class="w-full mt-6 bg-green-600 py-3 rounded-xl font-bold" onclick="sendOrder()">Оформить заказ</button>
        <button class="w-full mt-2 bg-gray-700 py-3 rounded-xl" onclick="closeCart()">Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const NGROK_URL = "https://sappiness-lyrically-icky.ngrok-free.dev"; 
        let cart = [], isAdmin = false;

        async function initApp() {
            try {
                const res = await fetch(NGROK_URL + "/api/admins", { headers: { 'ngrok-skip-browser-warning': 'true' } });
                const admins = await res.json();
                isAdmin = admins.includes(Number(tg.initDataUnsafe?.user?.id));
            } catch(e) {}
            loadProducts();
        }

        async function loadProducts() {
            const res = await fetch(NGROK_URL + "/api/products", { headers: { 'ngrok-skip-browser-warning': 'true' } });
            const products = await res.json();
            const list = document.getElementById('products-list');
            list.innerHTML = products.map(p => `
                <div class="bg-gray-800 p-3 rounded-lg flex justify-between items-center border border-gray-700">
                    <div class="flex items-center gap-2">
                        ${isAdmin ? `<button onclick="deleteProduct(${p.id})" class="text-red-500"><i class="fas fa-trash"></i></button>` : ''}
                        <div>
                            <h2 class="font-bold text-sm">${p.name}</h2>
                            <p class="text-gray-400 text-xs">${p.price} руб. | В наличии: ${p.qty}</p>
                        </div>
                    </div>
                    <button class="w-8 h-8 bg-green-500 rounded text-black font-bold" onclick="addToCart(${p.id}, '${p.name}', ${p.price}, ${p.qty})">+</button>
                </div>
            `).join('');
        }

        function addToCart(id, name, price, maxQty) {
            let item = cart.find(i => i.id === id);
            if (!item) cart.push({id, name, price, qty: 1});
            else if (item.qty < maxQty) item.qty++;
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-float').classList.toggle('hidden', count === 0);
        }

        function openCart() {
            document.getElementById('cart-modal').classList.remove('hidden');
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `
                <div class="flex justify-between bg-gray-800 p-3 rounded">
                    <span>${i.name} (x${i.qty})</span>
                    <button class="text-red-500" onclick="removeFromCart(${i.id})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI(); closeCart();
        }

        function closeCart() { document.getElementById('cart-modal').classList.add('hidden'); }
        function sendOrder() { tg.sendData(JSON.stringify(cart)); }
        initApp();
    </script>
</body>
</html>
